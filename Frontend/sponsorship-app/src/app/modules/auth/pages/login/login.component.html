<div class="login-container">
  <div class="login-wrapper">
    <!-- Left Side - Branding -->
    <div class="login-left">
      <div class="brand-content">
        <div class="logo">
          <i class="fas fa-handshake"></i>
        </div>
        <h1>Sponsorship<br>Workflow System</h1>
        <p>Manage sponsorship requests efficiently with automated approval workflow</p>
        <div class="features">
          <div class="feature">
            <i class="fas fa-check-circle"></i>
            <span>Request Submission</span>
          </div>
          <div class="feature">
            <i class="fas fa-check-circle"></i>
            <span>Manager Approval</span>
          </div>
          <div class="feature">
            <i class="fas fa-check-circle"></i>
            <span>Finance Review</span>
          </div>
          <div class="feature">
            <i class="fas fa-check-circle"></i>
            <span>Real-time Tracking</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Side - Login Form -->
    <div class="login-right">
      <div class="login-card">
        <div class="card-header">
          <h3>Welcome Back</h3>
          <p>Please login to your account</p>
        </div>

        <div class="card-body">
          <!-- Error Message -->
          <div *ngIf="errorMessage" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i>
            {{ errorMessage }}
          </div>

          <!-- Login Form -->
          <form (ngSubmit)="onSubmit()">
            <div class="form-group">
              <label>
                <i class="fas fa-user"></i>
                Username
              </label>
              <input
                type="text"
                class="form-control"
                [(ngModel)]="username"
                name="username"
                placeholder="Enter your username"
                [class.is-invalid]="errorMessage"
                autofocus>
            </div>

            <div class="form-group">
              <label>
                <i class="fas fa-lock"></i>
                Password
              </label>
              <div class="password-wrapper">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control"
                  [(ngModel)]="password"
                  name="password"
                  placeholder="Enter your password"
                  [class.is-invalid]="errorMessage">
                <button type="button" class="toggle-password" (click)="togglePassword()">
                  <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn-login" [disabled]="isLoading">
              <i *ngIf="!isLoading" class="fas fa-sign-in-alt"></i>
              <i *ngIf="isLoading" class="fas fa-spinner fa-spin"></i>
              {{ isLoading ? 'Logging in...' : 'Login' }}
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
